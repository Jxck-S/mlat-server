version: '3.8'

services:
  mlat-server:
    build: .
    container_name: mlat-server
    restart: always
    # Increase max open files (ulimit -n) to handle high concurrency (thousands of connections)
    ulimits:
      nofile:
        soft: 8000
        hard: 8000
    # Cap container log growth at 512MB total (4 x 128MB rotated files).
    # Without this the default json-file driver grows unbounded; client
    # connect/disconnect chatter reached 5GB in ~3 weeks and filled the disk.
    logging:
      driver: json-file
      options:
        max-size: "128m"
        max-file: "4"
    ports:
      - "31090:31090" # Client input (Beast/Raw)
      - "30104:30104" # BaseStation output
      - "8080:8080"   # HTTP File Server (sync.json, clients.json, etc)
    environment:
      - HTTP_PORT=8080
      - WORK_DIR=/run/mlat-server
      - PYTHONOPTIMIZE=2
    # Command arguments are passed directly to mlat-server via docker-entrypoint.sh
    command: >
      --client-listen 31090
      --filtered-basestation-listen 30104
      --work-dir /run/mlat-server
